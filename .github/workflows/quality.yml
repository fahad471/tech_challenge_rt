name: CI/CD

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    name: Build & Test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux GCC
            os: ubuntu-latest
            cc: gcc
            cxx: g++

          - name: Linux Clang
            os: ubuntu-latest
            cc: clang
            cxx: clang++

          - name: Windows MSVC
            os: windows-latest
            cc: ""
            cxx: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Conan
        run: python -m pip install "conan>=2,<3"

      - name: Create Conan profile
        if: runner.os != 'Windows'
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: conan profile detect --force

      - name: Create Conan profile
        if: runner.os == 'Windows'
        run: conan profile detect --force

      - name: Conan install
        if: runner.os != 'Windows'
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: >
          conan install .
          --build=missing
          -s build_type=Release
          -s compiler.cppstd=20

      - name: Conan install
        if: runner.os == 'Windows'
        run: >
          conan install .
          --build=missing
          -s build_type=Release
          -s compiler.cppstd=20

      - name: Configure Linux
        if: runner.os != 'Windows'
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: cmake --preset conan-release

      - name: Configure Windows
        if: runner.os == 'Windows'
        run: cmake --preset conan-release

      - name: Build
        run: cmake --build --preset conan-release

      - name: Test
        run: ctest --preset conan-release --output-on-failure

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang clang-tidy
          python -m pip install "conan>=2,<3" pre-commit

      - name: Configure project
        env:
          CC: clang
          CXX: clang++
        run: |
          conan profile detect --force
          conan install . \
            --build=missing \
            -s build_type=Release \
            -s compiler.cppstd=20
          cmake --preset conan-release

      - name: Run clang-format and clang-tidy
        run: pre-commit run --all-files --show-diff-on-failure

  install-package:
    name: Install & Package (${{ matrix.name }})
    needs:
      - build-test
      - lint

    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux GCC
            os: ubuntu-latest
            cc: gcc
            cxx: g++
            artifact: challenge-linux-gcc
            archive: challenge-linux-gcc.tar.gz

          - name: Linux Clang
            os: ubuntu-latest
            cc: clang
            cxx: clang++
            artifact: challenge-linux-clang
            archive: challenge-linux-clang.tar.gz

          - name: Windows MSVC
            os: windows-latest
            cc: ""
            cxx: ""
            artifact: challenge-windows-msvc
            archive: challenge-windows-msvc.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Conan
        run: python -m pip install "conan>=2,<3"

      - name: Create Conan profile
        if: runner.os != 'Windows'
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: conan profile detect --force

      - name: Create Conan profile
        if: runner.os == 'Windows'
        run: conan profile detect --force

      - name: Conan install
        if: runner.os != 'Windows'
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: >
          conan install .
          --build=missing
          -s build_type=Release
          -s compiler.cppstd=20

      - name: Conan install
        if: runner.os == 'Windows'
        run: >
          conan install .
          --build=missing
          -s build_type=Release
          -s compiler.cppstd=20

      - name: Configure Linux
        if: runner.os != 'Windows'
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: cmake --preset conan-release

      - name: Configure Windows
        if: runner.os == 'Windows'
        run: cmake --preset conan-release

      - name: Build
        run: cmake --build --preset conan-release

      - name: Install Linux
        if: runner.os != 'Windows'
        run: cmake --install build/Release --prefix package

      - name: Install Windows
        if: runner.os == 'Windows'
        run: cmake --install build/Release --config Release --prefix package

      - name: Create Linux archive
        if: runner.os != 'Windows'
        run: tar -czf "${{ matrix.archive }}" -C package .

      - name: Create Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path package\* -DestinationPath "${{ matrix.archive }}"

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - install-package

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            release-assets/* \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
