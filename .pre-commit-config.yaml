exclude: ^(build/|test_package/build/)

repos:
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v18.1.8
    hooks:
      - id: clang-format
        args:
          - --dry-run
          - --Werror
        types_or:
          - c
          - c++

  - repo: local
    hooks:
      - id: clang-tidy
        name: clang-tidy
        entry: clang-tidy
        language: system
        files: \.(c|cc|cpp|cxx)$
        args:
          - -p=build/Release
          - --warnings-as-errors=*
